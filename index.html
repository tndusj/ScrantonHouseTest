<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스크랜튼대학 기숙사 배정 테스트</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
    }

    .question {
      margin: 10px 0 24px;
      font-size: 21px;
      line-height: 1.6;
      font-weight: 700;
    }

    .intro {
      margin: 48px 0 20px;
    }

    .intro h1 {
      margin-bottom: 14px;
      font-size: 32px;
      line-height: 1.3;
    }

    .intro p {
      margin-bottom: 28px;
      font-size: 17px;
      line-height: 1.7;
      color: #dbeafe;
    }

    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress {
      margin-bottom: 18px;
      font-size: 14px;
      color: #cbd5e1;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 15px 16px;
      border: none;
      border-radius: 14px;
      background: #334155;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1.5;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    button:hover {
      background: #475569;
      transform: translateY(-1px);
    }

    #result {
      margin-top: 24px;
      line-height: 1.7;
    }

    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      gap: 18px;
    }

    .loading-text {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.6;
    }

    .loading-sub {
      font-size: 15px;
      color: #cbd5e1;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(255, 255, 255, 0.18);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-name {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .result-section {
      text-align: left;
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .result-section-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #dbeafe;
    }

    .result-section-body {
      font-size: 16px;
      line-height: 1.8;
      color: #f8fafc;
      white-space: pre-line;
    }

    .restart-btn {
      margin-top: 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .intro h1 {
        font-size: 28px;
      }

      .question {
        font-size: 19px;
      }

      .result-title {
        font-size: 24px;
      }

      .result-name {
        font-size: 26px;
      }

      .result-section-body {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="quiz"></div>
  <div id="result"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeA7Ss0jv6EuL4EYULlhK-Tl0CHRR07jyfRGRbaFh92CI2feenoMzHwBWuteFVjqub/exec";

      },

        fit: "Neuropuff에는 생각이 많고 관찰을 즐기며, 어려운 상황에서도 끝까지 버티는 사람이 어울립니다. 호기심이 많고 인간의 마음과 행동을 분석하는 데 흥미를 느끼며, 조용해 보여도 내적으로는 아주 질긴 사람이라면 Neuropuff에 가깝습니다."
      },
      SCRANTONDOR: {

  },
  en: {

        ]

        q: "When there are not enough major courses, what do you do?",
        a: [
          ["You find alternative paths and build the most efficient combination", "INTERCLAW"],
          ["You endure first and test every possible option one by one", "NEUROPUFF"],
          ["You raise the issue officially and demand improvement", "SCRANTONDOR"]
        ]
      },
      {
        q: "You run into a professor at ECC Gusia. What is your move?",
        a: [
          ["You smoothly begin an information-gathering conversation about research and career paths", "INTERCLAW"],
          ["You turn the moment into an observation experiment and start analyzing behavior", "NEUROPUFF"],
          ["You greet them warmly and ask what they think about the current state of the college", "SCRANTONDOR"]
        ]
      },
      {
        q: "Class starts in 4 minutes, but the elevator line gets cut off. What do you do?",
        a: [
          ["You calculate attendance weight and travel time, then choose the optimal move", "INTERCLAW"],
          ["You keep searching for hidden routes like the freight elevator until the end", "NEUROPUFF"],
          ["You feel deep anger at this structural inefficiency and charge for the stairs", "SCRANTONDOR"]
        ]
      },
      {
        q: "You receive several party invitations before the semester starts. Which one sounds best?",
        a: [
          ["A party with flashy dress codes and décor—perfect for getting lots of great photos for social media", "INTERCLAW"],

function showStartPage() {
  const quiz = document.getElementById("quiz");
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "";
  quiz.innerHTML = `
    <div class="card intro">
      <h1>${content.ko.startTitle}</h1>
      <p>${content.ko.startDesc}<br>${content.en.startDesc}</p>
      <div class="lang-buttons">
        <button id="startKoBtn">${content.ko.startKo}</button>
        <button id="startEnBtn">${content.en.startEn}</button>
      </div>
    </div>
  `;

  document.getElementById("startKoBtn").onclick = () => startTest("ko");
  document.getElementById("startEnBtn").onclick = () => startTest("en");
}

function startTest(lang) {
  selectedLanguage = lang;
  current = 0;
  score = { ...scoreTemplate };
  showQuestion();
}

function showQuestion() {
  const quiz = document.getElementById("quiz");
  const resultDiv = document.getElementById("result");
  const langContent = content[selectedLanguage];
  const questions = langContent.questions;

  quiz.innerHTML = "";
  resultDiv.innerHTML = "";

  if (current >= questions.length) {
    showLoadingAndSave();
    return;
  }

  const q = questions[current];
  const total = questions.length;

  const card = document.createElement("div");
  card.className = "card";

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.innerText = `${current + 1} / ${total}`;

  const title = document.createElement("div");
  title.className = "question";
  title.innerText = q.q;

  card.appendChild(progress);
  card.appendChild(title);

  q.a.forEach(answer => {
    const btn = document.createElement("button");
    btn.innerText = answer[0];
    btn.onclick = () => {
      score[answer[1]]++;
      current++;
      showQuestion();
    };
    card.appendChild(btn);
  });

  quiz.appendChild(card);
}

async function saveResultToGoogleSheets(resultKey) {
  const payload = {
    sessionId: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : "session-" + Date.now(),
    language: selectedLanguage,
    result: resultKey,
    score: score,
    userAgent: navigator.userAgent
  };

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.error("저장 실패:", err);
  }
}

function getResultKey() {
  return Object.keys(score).reduce((a, b) => score[a] >= score[b] ? a : b);
}

function renderResult(resultKey) {
  const quiz = document.getElementById("quiz");
  const resultDiv = document.getElementById("result");
  const langContent = content[selectedLanguage];
  const result = langContent.results[resultKey];

  quiz.innerHTML = "";

  resultDiv.innerHTML = `
    <div class="card">
      <div class="result-title">${langContent.resultTitle}</div>
      <div class="result-name">${result.name}</div>

      <div class="result-section">
        <div class="result-section-title">${langContent.meaningTitle}</div>
        <div class="result-section-body">${result.meaning}</div>
      </div>

      <div class="result-section">
        <div class="result-section-title">${langContent.fitTitle}</div>
        <div class="result-section-body">${result.fit}</div>
      </div>

      <button class="restart-btn" onclick="showStartPage()">${langContent.restart}</button>
    </div>
  `;
}

async function showLoadingAndSave() {
  const quiz = document.getElementById("quiz");
  const resultDiv = document.getElementById("result");
  const langContent = content[selectedLanguage];

  quiz.innerHTML = `
    <div class="card loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">${langContent.loadingTitle}</div>
      <div class="loading-sub">${langContent.loadingSub}</div>
    </div>
  `;
  resultDiv.innerHTML = "";

  const resultKey = getResultKey();

  await saveResultToGoogleSheets(resultKey);
  await new Promise(resolve => setTimeout(resolve, 1200));

  renderResult(resultKey);
}

showStartPage();
</script>

</body>
</html>
